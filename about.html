<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f4efe6" />
  <title>Vibe Store Web | About</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css?v=20260401b" />
</head>
<body class="store-layout">
  <div class="shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" data-link="index.html" role="button" tabindex="0">
          <span class="brand__mark">⚡</span>
          <span class="brand__text"><strong>Vibe Labs ⚡</strong><span>Mobile-first web store</span></span>
        </a>
        <nav class="nav">
          <button type="button" data-link="index.html"><span class="nav__icon">🏠</span><span class="nav__label">Home</span></button>
          <button type="button" data-link="apps.html"><span class="nav__icon">📦</span><span class="nav__label">Projects</span></button>
          <button type="button" data-link="search.html"><span class="nav__icon">🔎</span><span class="nav__label">Search</span></button>
          <button class="active" type="button" data-link="about.html"><span class="nav__icon">👤</span><span class="nav__label">About</span></button>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <p class="hero__eyebrow">About</p>
        <h1>Developer profile and linked releases.</h1>
        <p>View profile information and jump into listed projects quickly.</p>
      </section>

      <section class="split">
        <section id="profile-panel" class="panel"></section>
        <aside id="project-panel" class="panel"></aside>
      </section>
    </main>

    <footer class="site-footer">Vibe Store Web</footer>
  </div>

  <style>
    .project-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding-inline: 10px 14px;
    }

    .project-link__icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid rgba(139, 92, 246, 0.35);
      background: rgba(255, 255, 255, 0.08);
    }
  </style>

  <script src="assets/js/catalog-api.js?v=20260401b"></script>
  <script src="assets/js/catalog-snapshot.js?v=20260401b"></script>
  <script src="assets/js/site.js?v=20260401b"></script>
  <script>
    const profilePanel = document.getElementById("profile-panel");
    const projectPanel = document.getElementById("project-panel");

    function projectLinkButton(label, icon, target) {
      return `<button class="button-secondary project-link" type="button" data-link="${window.VibeSite.esc(target)}"><img class="project-link__icon" src="${window.VibeSite.esc(icon || "")}" alt="" /><span>${window.VibeSite.esc(label)}</span></button>`;
    }

    async function init() {
      try {
        const { apps, websites, profile } = await window.VibeSite.loadCatalogs();
        if (!profile) {
          profilePanel.innerHTML = window.VibeSite.emptyState("No profile data found.");
          projectPanel.innerHTML = window.VibeSite.emptyState("No linked projects found.");
          return;
        }

        profilePanel.innerHTML = `
          <p class="section__eyebrow">Profile</p>
          <div class="card__top">
            <img class="detail-hero__icon" src="${window.VibeSite.esc(profile.profilePic)}" alt="${window.VibeSite.esc(profile.name)}" />
            <div>
              <h2 class="card__title">${window.VibeSite.esc(profile.name)}</h2>
              <p class="muted">${window.VibeSite.esc(profile.role || "Developer")}</p>
              <div class="badge-row">
                <span class="badge">${window.VibeSite.esc(profile.specialBadge || "Maintainer")}</span>
              </div>
            </div>
          </div>
          <p class="muted">${window.VibeSite.esc(profile.summary || "")}</p>
          <div class="badge-row">
            ${(Array.isArray(profile.skills) ? profile.skills : []).map((skill) => `<span class="badge">${window.VibeSite.esc(skill)}</span>`).join("")}
          </div>
          <div class="button-row">
            ${profile.portfolioUrl ? `<button class="button" type="button" data-external="${window.VibeSite.esc(profile.portfolioUrl)}">Portfolio</button>` : ""}
            ${profile.githubUrl ? `<button class="button-secondary" type="button" data-external="${window.VibeSite.esc(profile.githubUrl)}">GitHub</button>` : ""}
            ${profile.email ? `<button class="button-secondary" type="button" data-mail="${window.VibeSite.esc(profile.email)}">Email</button>` : ""}
          </div>
        `;

        const linkedProjects = (Array.isArray(profile.projects) ? profile.projects : []).map((projectId) => {
          const app = apps.find((entry) => entry.id === projectId);
          if (app) {
            return `<li>${projectLinkButton(app.name, app.icon, window.VibeSite.appHref(app.id))}</li>`;
          }
          const website = websites.find((entry) => entry.id === projectId);
          if (website) {
            return `<li>${projectLinkButton(website.name, website.icon, window.VibeSite.websiteHref(website.id))}</li>`;
          }
          return `<li>${window.VibeSite.esc(projectId)}</li>`;
        }).join("");

        projectPanel.innerHTML = `
          <p class="section__eyebrow">Linked Projects</p>
          <h2 class="card__title">Linked Projects</h2>
          <p class="muted">Open any related project from this profile.</p>
          <ul class="list">${linkedProjects || "<li>No linked projects available.</li>"}</ul>
        `;
      } catch (_) {
        profilePanel.innerHTML = window.VibeSite.emptyState("Unable to load profile information.");
        projectPanel.innerHTML = window.VibeSite.emptyState("Unable to resolve linked projects.");
      }
    }

    init();
  </script>
</body>
</html>
