<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f4efe6" />
  <title>Vibe Store Web | App Details</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css?v=20260401b" />
  <style>
    /* ── Info pills: auto-size to content ── */
    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }
    .detail-meta__item {
      flex: none;
      padding: 10px 18px;
      border-radius: 12px;
    }
    .detail-meta__item strong { font-size: 14px; }

    /* ── Section spacing ── */
    .app-section { margin-top: 36px; }
    .app-section:first-child { margin-top: 0; }

    /* ── Horizontal screenshot strip ── */
    .screenshot-strip {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 4px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .screenshot-strip::-webkit-scrollbar { display: none; }
    .screenshot-strip__img {
      flex-shrink: 0;
      height: 300px;
      width: auto;
      max-width: 200px;
      border-radius: 16px;
      object-fit: cover;
      scroll-snap-align: start;
      cursor: pointer;
      border: 1px solid var(--line);
      transition: opacity .15s;
      display: block;
    }
    .screenshot-strip__img:hover { opacity: .82; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox__img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 10px;
      user-select: none;
      pointer-events: none;
      transform-origin: center center;
      transition: transform 0.12s;
      display: block;
    }
    .lightbox__btn {
      position: absolute;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 22px;
      backdrop-filter: blur(8px);
      z-index: 1;
      padding: 0;
      line-height: 1;
      transition: background .15s;
    }
    .lightbox__btn:hover { background: rgba(255,255,255,0.26); }
    .lightbox__close { top: 16px; right: 16px; font-size: 18px; }
    .lightbox__prev { left: 16px; top: 50%; transform: translateY(-50%); }
    .lightbox__next { right: 16px; top: 50%; transform: translateY(-50%); }

    /* ── Share sheet ── */
    .share-anchor {
      position: relative;
      display: inline-flex;
    }
    .share-sheet {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: var(--panel-strong, rgba(24,17,46,0.98));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 6px;
      min-width: 210px;
      z-index: 200;
      display: none;
      flex-direction: column;
      gap: 2px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      backdrop-filter: blur(18px);
    }
    .share-sheet.open { display: flex; }
    .share-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 3, 10, 0.62);
      backdrop-filter: blur(4px);
      z-index: 190;
      display: none;
    }
    .share-backdrop.open { display: block; }
    .share-sheet__item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--ink);
      text-align: left;
      font: inherit;
      font-size: 14px;
      width: 100%;
      transition: background .12s;
    }
    .share-sheet__item:hover { background: rgba(255,255,255,0.08); }
    .share-sheet__icon { font-size: 17px; width: 24px; text-align: center; flex-shrink: 0; }

    /* On Android/iOS, open as centered modal popup */
    body.share-sheet-mobile .share-sheet {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(88vw, 340px);
      z-index: 210;
      border-radius: 16px;
      padding: 8px;
    }
  </style>
</head>
<body class="store-layout">
  <div class="shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" data-link="index.html" role="button" tabindex="0">
          <span class="brand__mark">⚡</span>
          <span class="brand__text"><strong>Vibe Labs ⚡</strong><span>Mobile-first web store</span></span>
        </a>
        <nav class="nav">
          <button type="button" data-link="index.html"><span class="nav__icon">🏠</span><span class="nav__label">Home</span></button>
          <button type="button" data-link="apps.html"><span class="nav__icon">📦</span><span class="nav__label">Projects</span></button>
          <button type="button" data-link="search.html"><span class="nav__icon">🔎</span><span class="nav__label">Search</span></button>
          <button type="button" data-link="about.html"><span class="nav__icon">👤</span><span class="nav__label">About</span></button>
        </nav>
      </div>
    </header>

    <main class="page">
      <div id="app-detail" class="notice">Loading app details...</div>
    </main>

    <footer class="site-footer">Vibe Store Web</footer>
  </div>

  <script src="assets/js/catalog-api.js?v=20260401b"></script>
  <script src="assets/js/catalog-snapshot.js?v=20260401b"></script>
  <script src="assets/js/site.js?v=20260401b"></script>
  <script>
    const root = document.getElementById("app-detail");
    const canGoBack = Boolean(document.referrer);
    const esc = (s) => window.VibeSite.esc(s);

    // ── Render ───────────────────────────────────────────────────────────────
    function renderApp(app) {
      const screenshots = Array.isArray(app.screenshots) ? app.screenshots : [];
      const changelog   = Array.isArray(app.changelog)   ? app.changelog   : [];
      const developers  = window.VibeSite.developerNames(app) || app.team || "Vibe Labs";
      const apkUrl      = app.latest && app.latest.apkUrl ? app.latest.apkUrl : "";
      document.title = `Vibe Store Web | ${app.name}`;

      root.className = "";
      root.innerHTML = `
        <section class="app-section detail-hero">
          <p class="hero__eyebrow">App Details</p>
          <div class="detail-hero__top">
            <img class="detail-hero__icon" src="${esc(app.icon)}" alt="${esc(app.name)}" />
            <div>
              <h1>${esc(app.name)}</h1>
              <p>${esc(app.description || "No description available.")}</p>
              <div class="button-row">
                ${apkUrl
                  ? `<button class="button" type="button" id="dl-apk-btn">Download APK</button>`
                  : `<button class="button" type="button" disabled>No APK Available</button>`}
                <button class="button-secondary" type="button" id="vibe-store-btn">Open in Vibe Store</button>
                <span class="share-anchor">
                  <button class="button-secondary" type="button" id="share-btn">↗ Share</button>
                  <div class="share-backdrop" id="share-backdrop"></div>
                  <div class="share-sheet" id="share-sheet" role="menu">
                    <button class="share-sheet__item" id="share-copy" role="menuitem"><span class="share-sheet__icon">🔗</span>Copy link</button>
                    <button class="share-sheet__item" id="share-email" role="menuitem"><span class="share-sheet__icon">✉️</span>Send via email</button>
                    <button class="share-sheet__item" id="share-whatsapp" role="menuitem"><span class="share-sheet__icon">💬</span>WhatsApp</button>
                  </div>
                </span>
                ${canGoBack ? `<button class="button-secondary" type="button" id="back-btn">← Back</button>` : ""}
              </div>
            </div>
          </div>
          <div class="detail-meta">
            <div class="detail-meta__item"><span>Status</span><strong>${esc(app.status || "unknown")}</strong></div>
            <div class="detail-meta__item"><span>Version</span><strong>${esc(app.latest && app.latest.version ? app.latest.version : "Not released")}</strong></div>
            <div class="detail-meta__item"><span>Platform</span><strong>${esc(app.platformDetails || app.platform || "cross-platform")}</strong></div>
            <div class="detail-meta__item"><span>Package</span><strong>${esc(app.packageName || "Not listed")}</strong></div>
            <div class="detail-meta__item"><span>Developer</span><strong>${esc(developers)}</strong></div>
            <div class="detail-meta__item"><span>Build</span><strong>${esc(app.latest && app.latest.buildNumber ? app.latest.buildNumber : "N/A")}</strong></div>
          </div>
        </section>

        <section class="app-section">
          <div class="section__head">
            <div>
              <p class="section__eyebrow">Screenshots</p>
              <h2>Preview</h2>
            </div>
          </div>
          <div class="screenshot-strip" id="screenshot-strip">
            ${screenshots.length
              ? screenshots.map((src, i) =>
                  `<img class="screenshot-strip__img" src="${esc(src)}" alt="${esc(app.name)} screenshot ${i + 1}" data-index="${i}" />`
                ).join("")
              : window.VibeSite.emptyState("No screenshots available.")}
          </div>
        </section>

        <section class="app-section">
          <div class="section__head">
            <div>
              <p class="section__eyebrow">Release Notes</p>
              <h2>Changelog</h2>
            </div>
          </div>
          <ul class="list">
            ${changelog.length
              ? changelog.map((item) => `<li>${esc(item)}</li>`).join("")
              : "<li>No release notes available.</li>"}
          </ul>
        </section>
      `;

      // Back button
      document.getElementById("back-btn")?.addEventListener("click", () => history.back());

      const storeLink = app.openInVibeStoreUrl || app.vibeStoreOpenUrl || app.openUrl || window.VibeSite.appOpenLink(app.id);

      // Open in Vibe Store
      document.getElementById("vibe-store-btn")?.addEventListener("click", () => {
        window.location.assign(storeLink);
      });

      // Share sheet
      const shareBtn   = document.getElementById("share-btn");
      const shareSheet = document.getElementById("share-sheet");
      const shareBackdrop = document.getElementById("share-backdrop");
      const pageUrl    = storeLink;
      const shareTitle = `${app.name} – Vibe Store`;
      const isMobileOs = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (isMobileOs) {
        document.body.classList.add("share-sheet-mobile");
      }

      function closeShareSheet() {
        shareSheet?.classList.remove("open");
        shareBackdrop?.classList.remove("open");
      }

      function toggleShareSheet() {
        const opening = !shareSheet?.classList.contains("open");
        shareSheet?.classList.toggle("open");
        shareBackdrop?.classList.toggle("open", opening);
      }

      shareBtn?.addEventListener("click", async (e) => {
        e.stopPropagation();
        // On desktop, prefer native Web Share if available.
        if (!isMobileOs && navigator.share) {
          try {
            await navigator.share({ url: pageUrl });
            return;
          } catch (_) { /* fall through to custom sheet */ }
        }
        toggleShareSheet();
      });

      // Prevent sheet from closing when clicking inside it
      shareSheet?.addEventListener("click", (e) => e.stopPropagation());

      // Backdrop click
      shareBackdrop?.addEventListener("click", closeShareSheet);

      // Close on outside click
      document.addEventListener("click", closeShareSheet);

      function flashCopySuccess() {
        const icon = document.querySelector("#share-copy .share-sheet__icon");
        if (icon) {
          const orig = icon.textContent;
          icon.textContent = "✅";
          setTimeout(() => { icon.textContent = orig; }, 2000);
        }
      }

      async function copyTextToClipboard(text) {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch (_) {
          // Fall through to legacy copy method.
        }

        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.style.position = "fixed";
          ta.style.top = "-1000px";
          ta.style.left = "-1000px";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          ta.setSelectionRange(0, ta.value.length);
          const copied = document.execCommand("copy");
          document.body.removeChild(ta);
          return copied;
        } catch (_) {
          return false;
        }
      }

      // Copy link
      document.getElementById("share-copy")?.addEventListener("click", async () => {
        const copied = await copyTextToClipboard(pageUrl);
        if (copied) {
          flashCopySuccess();
        } else {
          window.prompt("Copy this link:", pageUrl);
        }
        closeShareSheet();
      });

      // Email
      document.getElementById("share-email")?.addEventListener("click", () => {
        const subject = encodeURIComponent(shareTitle);
        const body    = encodeURIComponent(`Check out ${app.name} on Vibe Store:\n${pageUrl}`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
        closeShareSheet();
      });

      // WhatsApp
      document.getElementById("share-whatsapp")?.addEventListener("click", () => {
        const text = encodeURIComponent(`Check out ${app.name} on Vibe Store: ${pageUrl}`);
        window.open(`https://wa.me/?text=${text}`, "_blank", "noopener,noreferrer");
        closeShareSheet();
      });

      // Download APK — programmatic, no URL exposed in DOM
      if (apkUrl) {
        document.getElementById("dl-apk-btn")?.addEventListener("click", () => {
          triggerDownload(apkUrl, (app.name || "app").replace(/\s+/g, "_") + ".apk");
        });
      }

      // Screenshot lightbox
      const strip = document.getElementById("screenshot-strip");
      if (strip && screenshots.length) {
        strip.addEventListener("click", (e) => {
          const img = e.target.closest(".screenshot-strip__img");
          if (img) openLightbox(screenshots, parseInt(img.dataset.index, 10));
        });
      }
    }

    // ── Download helper ──────────────────────────────────────────────────────
    // ── Download helper (fetch+blob — no URL exposure, no new tab) ───────────
    async function triggerDownload(url, filename) {
      const btn      = document.getElementById("dl-apk-btn");
      const origText = btn ? btn.textContent : "Download APK";
      if (btn) { btn.textContent = "Downloading…"; btn.disabled = true; }
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error("fetch failed");
        const blob   = await resp.blob();
        const objUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.style.display = "none";
        a.href     = objUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(objUrl); }, 2000);
      } catch (_) {
        // Fallback: navigate in same tab — browser handles APK as download
        window.location.assign(url);
      } finally {
        if (btn) { btn.textContent = origText; btn.disabled = false; }
      }
    }

    // ── Lightbox ─────────────────────────────────────────────────────────────
    let lbEl = null, lbSrcs = [], lbIdx = 0, lbScale = 1, lbPinchDist = null;

    function openLightbox(srcs, startIdx) {
      lbSrcs = srcs;
      lbIdx  = startIdx;
      lbScale = 1;

      if (!lbEl) {
        lbEl = document.createElement("div");
        lbEl.className = "lightbox";
        lbEl.innerHTML = `
          <button class="lightbox__btn lightbox__close" id="lb-close" aria-label="Close">✕</button>
          <button class="lightbox__btn lightbox__prev" id="lb-prev"  aria-label="Previous">&#8249;</button>
          <img class="lightbox__img" id="lb-img" alt="" />
          <button class="lightbox__btn lightbox__next" id="lb-next"  aria-label="Next">&#8250;</button>
        `;
        document.body.appendChild(lbEl);

        document.getElementById("lb-close").addEventListener("click", closeLightbox);
        document.getElementById("lb-prev").addEventListener("click", () => lbGo(lbIdx - 1));
        document.getElementById("lb-next").addEventListener("click", () => lbGo(lbIdx + 1));
        lbEl.addEventListener("click", (e) => { if (e.target === lbEl) closeLightbox(); });

        // Keyboard
        document.addEventListener("keydown", (e) => {
          if (!lbEl || lbEl.style.display === "none") return;
          if (e.key === "Escape")      closeLightbox();
          if (e.key === "ArrowLeft")  lbGo(lbIdx - 1);
          if (e.key === "ArrowRight") lbGo(lbIdx + 1);
        });

        // Wheel zoom
        lbEl.addEventListener("wheel", (e) => {
          e.preventDefault();
          lbScale = Math.min(4, Math.max(1, lbScale - e.deltaY * 0.0025));
          lbApplyScale();
        }, { passive: false });

        // Touch pinch zoom
        lbEl.addEventListener("touchstart",  lbTouchStart, { passive: true });
        lbEl.addEventListener("touchmove",   lbTouchMove,  { passive: false });
        lbEl.addEventListener("touchend",    () => { lbPinchDist = null; }, { passive: true });
      }

      lbEl.style.display = "flex";
      lbGo(lbIdx);
    }

    function closeLightbox() {
      if (lbEl) lbEl.style.display = "none";
      lbScale = 1;
    }

    function lbGo(idx) {
      lbIdx = (idx + lbSrcs.length) % lbSrcs.length;
      lbScale = 1;
      const img = document.getElementById("lb-img");
      if (img) { img.src = lbSrcs[lbIdx]; img.style.transform = "scale(1)"; }
      const many = lbSrcs.length > 1;
      document.getElementById("lb-prev").style.display = many ? "" : "none";
      document.getElementById("lb-next").style.display = many ? "" : "none";
    }

    function lbApplyScale() {
      const img = document.getElementById("lb-img");
      if (img) img.style.transform = `scale(${lbScale})`;
    }

    function lbTouchStart(e) {
      if (e.touches.length === 2) lbPinchDist = pinchDist(e.touches);
    }

    function lbTouchMove(e) {
      if (e.touches.length !== 2) return;
      e.preventDefault();
      const d = pinchDist(e.touches);
      if (lbPinchDist) {
        lbScale = Math.min(4, Math.max(1, lbScale * (d / lbPinchDist)));
        lbApplyScale();
      }
      lbPinchDist = d;
    }

    function pinchDist(touches) {
      return Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
      );
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      try {
        const appId = window.VibeSite.queryValue("id");
        const apps  = await window.VibeSite.loadApps();
        const app   = apps.find((e) => String(e.id).toLowerCase() === appId.toLowerCase());
        if (!app) { root.innerHTML = window.VibeSite.emptyState("App not found."); return; }
        renderApp(app);
      } catch (_) {
        root.innerHTML = window.VibeSite.emptyState("Unable to load app details.");
      }
    }

    init();
  </script>
</body>
</html>
