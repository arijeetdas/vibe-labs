<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f4efe6" />
  <title>Vibe Store Web | Projects</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css?v=20260401b" />
</head>
<body class="store-layout">
  <div class="shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" data-link="index.html" role="button" tabindex="0">
          <span class="brand__mark">⚡</span>
          <span class="brand__text"><strong>Vibe Labs ⚡</strong><span>Mobile-first web store</span></span>
        </a>
        <nav class="nav">
          <button type="button" data-link="index.html"><span class="nav__icon">🏠</span><span class="nav__label">Home</span></button>
          <button class="active" type="button" data-link="apps.html"><span class="nav__icon">📦</span><span class="nav__label">Projects</span></button>
          <button type="button" data-link="search.html"><span class="nav__icon">🔎</span><span class="nav__label">Search</span></button>
          <button type="button" data-link="about.html"><span class="nav__icon">👤</span><span class="nav__label">About</span></button>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <p class="hero__eyebrow">Projects</p>
        <h1>Everything in one store shelf.</h1>
        <p>Browse all apps and websites in the same layout and jump directly into detail screens.</p>
        <p id="project-meta" class="muted">Loading projects...</p>
      </section>

      <section class="section">
        <div class="section__head">
          <div>
            <p class="section__eyebrow">Apps</p>
            <h2>Applications</h2>
          </div>
        </div>
        <div id="app-grid" class="grid"></div>
      </section>

      <section class="section">
        <div class="section__head">
          <div>
            <p class="section__eyebrow">Websites</p>
            <h2>Web Projects</h2>
          </div>
        </div>
        <div id="website-grid" class="grid"></div>
      </section>
    </main>

    <footer class="site-footer">Vibe Store Web</footer>
  </div>

  <script src="assets/js/catalog-api.js?v=20260401b"></script>
  <script src="assets/js/catalog-snapshot.js?v=20260401b"></script>
  <script src="assets/js/site.js?v=20260401b"></script>
  <script>
    const meta = document.getElementById("project-meta");
    const appGrid = document.getElementById("app-grid");
    const websiteGrid = document.getElementById("website-grid");

    async function init() {
      try {
        const [apps, websites] = await Promise.all([
          window.VibeSite.loadApps(),
          window.VibeSite.loadWebsites()
        ]);

        meta.textContent = `${apps.length + websites.length} project(s)`;
        window.VibeSite.mountGrid(appGrid, apps, window.VibeSite.renderAppCard, "No apps available.");
        window.VibeSite.mountGrid(websiteGrid, websites, window.VibeSite.renderWebsiteCard, "No websites available.");
      } catch (_) {
        meta.textContent = "Projects could not be loaded.";
        appGrid.innerHTML = window.VibeSite.emptyState("Unable to load apps.");
        websiteGrid.innerHTML = window.VibeSite.emptyState("Unable to load websites.");
      }
    }

    init();
  </script>
</body>
</html>
