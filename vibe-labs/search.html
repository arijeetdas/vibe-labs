<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f4efe6" />
  <title>Vibe Store Web | Search</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css?v=20260401b" />
</head>
<body class="store-layout">
  <div class="shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" data-link="index.html" role="button" tabindex="0">
          <span class="brand__mark">⚡</span>
          <span class="brand__text"><strong>Vibe Labs⚡</strong><span>Mobile-first web store</span></span>
        </a>
        <nav class="nav">
          <button type="button" data-link="index.html"><span class="nav__icon">🏠</span><span class="nav__label">Home</span></button>
          <button type="button" data-link="apps.html"><span class="nav__icon">📦</span><span class="nav__label">Projects</span></button>
          <button class="active" type="button" data-link="search.html"><span class="nav__icon">🔎</span><span class="nav__label">Search</span></button>
          <button type="button" data-link="about.html"><span class="nav__icon">👤</span><span class="nav__label">About</span></button>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <p class="hero__eyebrow">Search</p>
        <h1>Find any app or website from one place.</h1>
        <p>Search updates instantly and routes to reusable detail screens.</p>
        <div class="toolbar">
          <input id="search-input" class="searchbar" type="search" placeholder="Search by Project Name" />
        </div>
        <div id="search-filters" class="filter-pills" role="group" aria-label="Status Filters">
          <button class="filter-pill active" type="button" data-filter="all">All</button>
          <button class="filter-pill" type="button" data-filter="stable">Stable</button>
          <button class="filter-pill" type="button" data-filter="beta-test">Beta/Test</button>
          <button class="filter-pill" type="button" data-filter="unreleased">Unreleased</button>
          <button class="filter-pill" type="button" data-filter="depreciated">Depreciated</button>
        </div>
        <p id="search-meta" class="muted search-meta">Type to search projects.</p>
      </section>

      <section class="section">
        <div id="search-results" class="grid"></div>
      </section>
    </main>

    <footer class="site-footer">Vibe Store Web</footer>
  </div>

  <script src="assets/js/catalog-api.js?v=20260401b"></script>
  <script src="assets/js/catalog-snapshot.js?v=20260401b"></script>
  <script src="assets/js/site.js?v=20260401b"></script>
  <script>
    const input = document.getElementById("search-input");
    const meta = document.getElementById("search-meta");
    const results = document.getElementById("search-results");
    const filters = document.getElementById("search-filters");
    const pills = Array.from(filters.querySelectorAll(".filter-pill"));
    let entries = [];
    let activeFilter = "all";

    function searchableText(entry) {
      return [
        entry.type,
        entry.name,
        entry.team,
        entry.status,
        entry.platform,
        entry.platformDetails,
        entry.description,
        window.VibeSite.developerNames(entry)
      ].join(" ").toLowerCase();
    }

    function matchesFilter(entry) {
      const status = String(entry.status || "").toLowerCase();

      if (activeFilter === "all") {
        return true;
      }

      if (activeFilter === "stable") {
        return status === "stable";
      }

      if (activeFilter === "beta-test") {
        return ["beta", "test"].some((token) => status.includes(token));
      }

      if (activeFilter === "unreleased") {
        return status.includes("unreleased");
      }

      if (activeFilter === "depreciated") {
        return ["deprecated", "depreciated"].some((token) => status.includes(token));
      }

      return true;
    }

    function renderList(query) {
      const normalized = query.trim().toLowerCase();
      if (!normalized) {
        meta.textContent = "Type to search projects.";
        results.innerHTML = window.VibeSite.emptyState("No projects listed yet. Start typing to search.");
        return;
      }

      const filtered = entries.filter((entry) => searchableText(entry).includes(normalized) && matchesFilter(entry));

      meta.textContent = `${filtered.length} result(s)`;
      results.innerHTML = filtered.length
        ? filtered.map((entry) => entry.type === "app"
          ? window.VibeSite.renderAppCard(entry)
          : window.VibeSite.renderWebsiteCard(entry)).join("")
        : window.VibeSite.emptyState("No projects matched your search and selected filter.");
    }

    async function init() {
      try {
        const [apps, websites] = await Promise.all([
          window.VibeSite.loadApps(),
          window.VibeSite.loadWebsites()
        ]);

        entries = [
          ...apps.map((app) => ({ ...app, type: "app" })),
          ...websites.map((site) => ({ ...site, type: "website" }))
        ];
        renderList("");
      } catch (_) {
        meta.textContent = "Search data could not be loaded.";
        results.innerHTML = window.VibeSite.emptyState("Unable to load search results.");
      }
    }

    pills.forEach((pill) => {
      pill.addEventListener("click", () => {
        activeFilter = pill.dataset.filter || "all";
        pills.forEach((item) => item.classList.toggle("active", item === pill));
        renderList(input.value);
      });
    });

    input.addEventListener("input", () => renderList(input.value));
    init();
  </script>
</body>
</html>
